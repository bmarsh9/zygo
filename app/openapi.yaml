  # ── Credentials ───────────────────────────────────────────────────────────

  /tenants/{tenant_id}/credentials:
    get:
      tags: [Credentials]
      summary: List credentials (masked)
      description: Requires viewer role.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
      responses:
        '200':
          description: List of credentials with masked data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Credential'
    post:
      tags: [Credentials]
      summary: Create a credential
      description: Requires editor role. Name must be lowercase alphanumeric with underscores.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  pattern: '^[a-z0-9_]+$'
                label:
                  type: string
                integration:
                  type: string
                data:
                  type: object
                  description: Credential data (will be encrypted)
      responses:
        '201':
          description: Credential created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Credential'
        '400':
          description: Invalid name
        '409':
          description: Name already exists

  /tenants/{tenant_id}/credentials/{cred_id}:
    put:
      tags: [Credentials]
      summary: Update a credential
      description: Requires editor role. Must be owner or admin.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
        - name: cred_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
                integration:
                  type: string
                data:
                  type: object
      responses:
        '200':
          description: Credential updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Credential'
    delete:
      tags: [Credentials]
      summary: Delete a credential
      description: Requires editor role. Must be owner or admin.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
        - name: cred_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Credential deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  # ── Data Tables ───────────────────────────────────────────────────────────

  /tenants/{tenant_id}/tables:
    get:
      tags: [Data Tables]
      summary: List all tables
      description: Requires viewer role.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
      responses:
        '200':
          description: Tables with record counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DataTable'

  /tenants/{tenant_id}/tables/{table_name}:
    get:
      tags: [Data Tables]
      summary: Get table records
      description: Requires viewer role.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
        - name: table_name
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: key
          in: query
          schema:
            type: string
          description: Filter by record key
      responses:
        '200':
          description: Table records
          content:
            application/json:
              schema:
                type: object
                properties:
                  table:
                    type: string
                  total:
                    type: integer
                  records:
                    type: array
                    items:
                      $ref: '#/components/schemas/DataRecord'
    delete:
      tags: [Data Tables]
      summary: Delete all records in a table
      description: Requires editor role.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
        - name: table_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Table deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  deleted:
                    type: string

  /tenants/{tenant_id}/tables/{table_name}/records:
    get:
      tags: [Data Tables]
      summary: Get paginated table records
      description: Requires viewer role.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
        - name: table_name
          in: path
          required: true
          schema:
            type: string
        - name: days
          in: query
          schema:
            type: integer
            default: 7
            enum: [7, 14, 30, 45]
          description: Records created within this many days
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 500
            maximum: 1000
      responses:
        '200':
          description: Paginated records
          content:
            application/json:
              schema:
                type: object
                properties:
                  records:
                    type: array
                    items:
                      $ref: '#/components/schemas/DataRecord'
                  page:
                    type: integer
                  per_page:
                    type: integer
                  total:
                    type: integer
                  pages:
                    type: integer
                  has_next:
                    type: boolean
    post:
      tags: [Data Tables]
      summary: Insert a record
      description: Requires editor role.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
        - name: table_name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                record_key:
                  type: string
                data:
                  type: object
      responses:
        '200':
          description: Record inserted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  action:
                    type: string
                  table:
                    type: string
                  id:
                    type: string
                  key:
                    type: string
                  data:
                    type: object

  /tenants/{tenant_id}/tables/{table_name}/records/{record_id}:
    put:
      tags: [Data Tables]
      summary: Update a record
      description: Requires editor role.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
        - name: table_name
          in: path
          required: true
          schema:
            type: string
        - name: record_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
      responses:
        '200':
          description: Record updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  record:
                    $ref: '#/components/schemas/DataRecord'
    delete:
      tags: [Data Tables]
      summary: Delete a record
      description: Requires editor role.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
        - name: table_name
          in: path
          required: true
          schema:
            type: string
        - name: record_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Record deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /tenants/{tenant_id}/tables/{table_name}/schema:
    get:
      tags: [Data Tables]
      summary: Get table schema
      description: Requires viewer role.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
        - name: table_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Table schema
          content:
            application/json:
              schema:
                type: object
                properties:
                  table:
                    type: string
                  fields:
                    type: array
                    items:
                      type: object
    post:
      tags: [Data Tables]
      summary: Create a table schema
      description: Requires editor role. Fails if table already exists.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
        - name: table_name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fields]
              properties:
                fields:
                  type: array
                  items:
                    type: object
                  minItems: 1
      responses:
        '201':
          description: Schema created
        '400':
          description: No fields provided
        '409':
          description: Table already exists
    put:
      tags: [Data Tables]
      summary: Update a table schema
      description: Requires editor role. Removes dropped columns from existing records.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
        - name: table_name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fields]
              properties:
                fields:
                  type: array
                  items:
                    type: object
                  minItems: 1
      responses:
        '200':
          description: Schema updated
        '404':
          description: Table not found

