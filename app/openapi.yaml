      description: Requires viewer role. Resolves template variables from session/URL params.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
        - $ref: '#/components/parameters/flow_id'
        - name: node_id
          in: path
          required: true
          schema:
            type: string
        - name: session
          in: query
          schema:
            type: string
          description: Form session token for multi-step forms
      responses:
        '200':
          description: Form definition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormDefinition'
    put:
      tags: [Forms]
      summary: Save form definition for a node
      description: Requires editor role.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
        - $ref: '#/components/parameters/flow_id'
        - name: node_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                elements:
                  type: array
                  items:
                    type: object
      responses:
        '200':
          description: Form saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  # ── Forms (Public) ───────────────────────────────────────────────────────

  /forms/{node_id}:
    get:
      tags: [Forms]
      summary: Get a public form
      description: No authentication required. Rate limited to 5/second.
      security: []
      parameters:
        - name: node_id
          in: path
          required: true
          schema:
            type: string
        - name: session
          in: query
          schema:
            type: string
          description: Form session token
      responses:
        '200':
          description: Form definition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormDefinition'
        '404':
          description: Form not found

  /forms/{node_id}/submit:
    post:
      tags: [Forms]
      summary: Submit a public form
      description: No authentication required. Rate limited to 5/second.
      security: []
      parameters:
        - name: node_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Form submitted
        '403':
          description: Form not published
        '404':
          description: Form not found

  /form-jobs/{job_id}:
    get:
      tags: [Forms]
      summary: Poll form submission job status
      description: Public endpoint for checking form submission progress.
      security: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job status
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                  status:
                    type: string
                  result:
                    type: object
                    nullable: true
                  error:
                    type: string
                    nullable: true

  /form-sessions/{token}:
    get:
      tags: [Forms]
      summary: Get form session data
      description: Public endpoint for multi-step form state.
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Form session state
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  flow_id:
                    type: string
                  current_node_id:
                    type: string
                  step_index:
                    type: integer
                  total_steps:
                    type: integer
                  prefill:
                    type: object

  # ── Webhooks ──────────────────────────────────────────────────────────────

  /webhook/{node_id}:
    get:
      tags: [Webhooks]
      summary: Trigger a webhook
      description: |
        Public endpoint. Supports GET, POST, PUT, DELETE, PATCH.
        Authentication via the `Authorization` header if configured on the webhook node.
      security: []
      parameters:
        - name: node_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Webhook response (configurable)
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
        '404':
          description: Webhook not found
        '405':
          description: Method not allowed
    post:
      tags: [Webhooks]
      summary: Trigger a webhook (POST)
      security: []
      parameters:
        - name: node_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Webhook response
          content:
            application/json:
              schema:
                type: object

  # ── Integrations ──────────────────────────────────────────────────────────

  /integrations:
    get:
      tags: [Integrations]
      summary: List available integrations
      description: Returns integrations with sensitive fields stripped.
      responses:
        '200':
          description: Available integrations
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /operators:
    get:
      tags: [Integrations]
      summary: List available operators
      responses:
        '200':
          description: Operator schema
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  # ── Logs ──────────────────────────────────────────────────────────────────

  /logs:
    get:
      tags: [Logs]
      summary: Get system logs
      description: Superadmin only.
      responses:
        '200':
          description: Recent logs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /tenants/{tenant_id}/logs:
    get:
      tags: [Logs]
      summary: Get tenant logs
      description: Requires viewer role.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
      responses:
        '200':
          description: Tenant logs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  # ── Feedback ──────────────────────────────────────────────────────────────

  /feedback:
    post:
      tags: [Feedback]
      summary: Submit feedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                email:
                  type: string
                page:
                  type: string
      responses:
        '200':
          description: Feedback submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOk'
        '400':
          description: Message is required

  # ── Misc ──────────────────────────────────────────────────────────────────

  /email-check:
    get:
      tags: [Health]
      summary: Send test email
      description: Superadmin only. Sends a test email to the current user.
      responses:
        '200':
          description: Email attempt result
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  success:
                    type: boolean