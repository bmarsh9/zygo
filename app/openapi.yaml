openapi: 3.0.3
info:
  title: API
  description: |
    Multi-tenant workflow automation platform API.

    ## Authentication

    **Browser (session-based):** Cookie-based session via Flask-Login.

    **API (token-based):** Pass a JWT token in the `token` HTTP header. Obtain a token
    via `GET /api/token` while authenticated in a browser session. The token is user-scoped —
    tenant access is determined by the `{tenant_id}` in each endpoint's URL path.

    ## Authorization

    Resources are scoped to tenants. Each tenant member has one or more roles:
    - **user** — minimal access (web forms only)
    - **viewer** — read access to all tenant resources
    - **editor** — read + write access
    - **admin** — full access including member management

    Superadmins can access any tenant and any resource.

    ## Tenant Isolation

    All `/tenants/{tenant_id}/...` endpoints enforce that the authenticated user
    is a member of the specified tenant with sufficient role. Resources are always
    scoped to a single tenant per request.
  version: 1.0.0

servers:
  - url: /api
    description: API prefix

# ── Security ──────────────────────────────────────────────────────────────────

security:
  - sessionAuth: []
  - tokenAuth: []

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: session
      description: Flask session cookie (browser-based login)
    tokenAuth:
      type: apiKey
      in: header
      name: token
      description: JWT token obtained from `GET /api/token`

  parameters:
    tenant_id:
      name: tenant_id
      in: path
      required: true
      schema:
        type: string
      description: Tenant ID
    flow_id:
      name: flow_id
      in: path
      required: true
      schema:
        type: string
      description: Flow ID
    ticket_id:
      name: ticket_id
      in: path
      required: true
      schema:
        type: string
      description: Ticket ID
    dashboard_id:
      name: dashboard_id
      in: path
      required: true
      schema:
        type: string
      description: Dashboard ID
    user_id:
      name: user_id
      in: path
      required: true
      schema:
        type: string
      description: User ID
    limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 50
      description: Maximum number of results to return

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

    Ok:
      type: object
      properties:
        ok:
          type: boolean
          example: true

    MessageOk:
      type: object
      properties:
        message:
          type: string
          example: ok

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        display_name:
          type: string
        license:
          type: string
        trial_days:
          type: integer
        is_active:
          type: boolean
        super:
          type: boolean
        email_confirmed_at:
          type: string
          format: date-time
          nullable: true

    Tenant:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        contact_email:
          type: string
          format: email
        magic_link_login:
          type: boolean
        approved_domains:
          type: string
        license:
          type: string
        flow_cap:
          type: integer

    Flow:
      type: object
      properties:
        id:
          type: string
        tenant_id:
          type: string
        name:
          type: string
        is_published:
          type: boolean
        folder:
          type: string
          nullable: true
        updated_at:
          type: string
          format: date-time

    FlowDetail:
      allOf:
        - $ref: '#/components/schemas/Flow'
        - type: object
          properties:
            nodes:
              type: array
              items:
                $ref: '#/components/schemas/Node'
            edges:
              type: array
              items:
                $ref: '#/components/schemas/Edge'
            notes:
              type: array
              items:
                type: object

    Node:
      type: object
      properties:
        id:
          type: string
        node_id:
          type: string
        name:
          type: string
        label:
          type: string
        node_type:
          type: string
        pos_x:
          type: number
        pos_y:
          type: number
        inputs:
          type: integer
        outputs:
          type: integer
        has_failure_path:
          type: boolean
        action_id:
          type: string
          nullable: true
        action_name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        config:
          type: object

    Edge:
      type: object
      properties:
        source_node_id:
          type: string
        source_output:
          type: integer
        target_node_id:
          type: string
        target_input:
          type: integer

    Run:
      type: object
      properties:
        id:
          type: string
        flow_id:
          type: string
        status:
          type: string
          enum: [queued, running, completed, failed, cancelled]
        created_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
          nullable: true

    Credential:
      type: object
      properties:
        id:
          type: string
        tenant_id:
          type: string
        name:
          type: string
        label:
          type: string
        integration:
          type: string
          nullable: true

    DataTable:
      type: object
      properties:
        name:
          type: string
        count:
          type: integer

    DataRecord:
      type: object
      properties:
        id:
          type: string
        key:
          type: string
          nullable: true
        data:
          type: object

    Ticket:
      type: object
      properties:
        id:
          type: string
        tenant_id:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [open, in_progress, resolved, closed]
        priority:
          type: string
          enum: [low, medium, high, critical]
        assignee:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        content:
          type: object
        meta:
          type: object
        created_at:
          type: string
          format: date-time
        closed_at:
          type: string
          format: date-time
          nullable: true

    TicketComment:
      type: object
      properties:
        id:
          type: string
        ticket_id:
          type: string
        author:
          type: string
        body:
          type: string
        created_at:
          type: string
          format: date-time

    Dashboard:
      type: object
      properties:
        id:
          type: string
        tenant_id:
          type: string
        name:
          type: string
        widgets:
          type: array
          items:
            type: object
        updated_at:
          type: string
          format: date-time

    Session:
      type: object
      properties:
        tenant_id:
          type: string
          nullable: true
        tenant_name:
          type: string
          nullable: true
        tenant_roles:
          type: array
          items:
            type: string
        user_id:
          type: string
        user_email:
          type: string
        user_super:
          type: boolean

    FormDefinition:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        elements:
          type: array
          items:
            type: object

  responses:
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

# ── Tags ──────────────────────────────────────────────────────────────────────

tags:
  - name: Health
    description: Health check
  - name: Auth & Session
    description: Session management and token generation
  - name: Users
    description: User management (superadmin or self)
  - name: Tenants
    description: Tenant management and membership
  - name: Flows
    description: Flow CRUD, saving, running, and scheduling
  - name: Runs & Jobs
    description: Flow run history and job management
  - name: Credentials
    description: Encrypted credential storage
  - name: Data Tables
    description: Key-value data tables and schemas
  - name: Tickets
    description: Ticket tracking with comments
  - name: Dashboards
    description: Dashboard CRUD
  - name: Forms
    description: Form builder and public form submission
  - name: Webhooks
    description: Webhook endpoints
  - name: Integrations
    description: Available integrations and operators
  - name: Logs
    description: System and tenant logs
  - name: Feedback
    description: User feedback

# ── Paths ─────────────────────────────────────────────────────────────────────

paths:

  # ── Health ────────────────────────────────────────────────────────────────

  /health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: ok

  # ── Auth & Session ────────────────────────────────────────────────────────

  /token:
    get:
      tags: [Auth & Session]
      summary: Generate an API token
      description: Returns a signed JWT token for API access. Requires an active browser session.
      parameters:
        - name: expiration
          in: query
          schema:
            type: integer
            default: 600
          description: Token lifetime in seconds
      responses:
        '200':
          description: Token generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  expires_in:
                    type: integer

  /session:
    get:
      tags: [Auth & Session]
      summary: Get current session data
      responses:
        '200':
          description: Current session context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
    delete:
      tags: [Auth & Session]
      summary: Clear session
      responses:
        '200':
          description: Session cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOk'

  /session/{tenant_id}:
    put:
      tags: [Auth & Session]
      summary: Switch active tenant
      parameters:
        - $ref: '#/components/parameters/tenant_id'
      responses:
        '200':
          description: Tenant switched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOk'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /session/refresh:
    post:
      tags: [Auth & Session]
      summary: Refresh session data
      responses:
        '200':
          description: Refreshed session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'

  # ── Users ─────────────────────────────────────────────────────────────────

  /users/exist:
    post:
      tags: [Users]
      summary: Check if a user exists by email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: User exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: boolean
                    example: true
        '404':
          description: User not found

  /users:
    get:
      tags: [Users]
      summary: List all users
      description: Superadmin only.
      responses:
        '200':
          description: List of all users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Users]
      summary: Create a user
      description: Superadmin only. Creates a super user and sends notification.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: User created
          content:
            application/json:
              schema:
                type: object
        '403':
          $ref: '#/components/responses/Forbidden'

  /users/{user_id}:
    get:
      tags: [Users]
      summary: Get a user
      description: Self or superadmin only.
      parameters:
        - $ref: '#/components/parameters/user_id'
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Users]
      summary: Update a user
      description: |
        Self or superadmin. Superadmins can additionally set `is_active`, `super`,
        `can_user_create_tenant`, and `tenant_limit`.
      parameters:
        - $ref: '#/components/parameters/user_id'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                display_name:
                  type: string
                license:
                  type: string
                trial_days:
                  type: integer
                is_active:
                  type: boolean
                  description: Superadmin only
                super:
                  type: boolean
                  description: Superadmin only
                can_user_create_tenant:
                  type: boolean
                  description: Superadmin only
                tenant_limit:
                  type: integer
                  description: Superadmin only
                email_confirmed:
                  type: boolean
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    $ref: '#/components/schemas/User'
    delete:
      tags: [Users]
      summary: Deactivate a user
      description: Self or superadmin. Soft-deletes by setting is_active=false.
      parameters:
        - $ref: '#/components/parameters/user_id'
      responses:
        '200':
          description: User deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOk'

  /users/{user_id}/password:
    put:
      tags: [Users]
      summary: Change password
      description: Self or superadmin.
      parameters:
        - $ref: '#/components/parameters/user_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password, password2]
              properties:
                password:
                  type: string
                  format: password
                password2:
                  type: string
                  format: password
                  description: Must match password
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '422':
          description: Invalid password

  /users/{user_id}/welcome-dismissed:
    put:
      tags: [Users]
      summary: Dismiss welcome message
      description: Self only.
      parameters:
        - $ref: '#/components/parameters/user_id'
      responses:
        '200':
          description: Welcome dismissed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOk'

  /users/{user_id}/send-confirmation:
    post:
      tags: [Users]
      summary: Send email confirmation
      description: Self, superadmin, or tenant admin for shared tenant member.
      parameters:
        - $ref: '#/components/parameters/user_id'
      responses:
        '200':
          description: Confirmation email sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOk'

  /users/{user_id}/verify-confirmation-code:
    post:
      tags: [Users]
      summary: Verify email confirmation code
      description: Self only.
      parameters:
        - $ref: '#/components/parameters/user_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        '200':
          description: Email confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOk'
        '403':
          description: Invalid confirmation code

  /users/{user_id}/tenants:
    get:
      tags: [Users]
      summary: List tenants for a user
      description: Self or superadmin.
      parameters:
        - $ref: '#/components/parameters/user_id'
      responses:
        '200':
          description: List of tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string

  /users/{user_id}/tenants/{tenant_id}/roles:
    get:
      tags: [Users]
      summary: Get user roles in a tenant
      description: Requires viewer role in the tenant.
      parameters:
        - $ref: '#/components/parameters/user_id'
        - $ref: '#/components/parameters/tenant_id'
      responses:
        '200':
          description: List of roles
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  # ── Tenants ───────────────────────────────────────────────────────────────

  /tenants:
    get:
      tags: [Tenants]
      summary: List tenants for current user
      responses:
        '200':
          description: Tenants the user belongs to
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tenant'
    post:
      tags: [Tenants]
      summary: Create a tenant
      description: Requires the `can_user_create_tenant` flag and being under `tenant_limit`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                contact_email:
                  type: string
                  format: email
                approved_domains:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: string
      responses:
        '200':
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '400':
          description: Invalid input
        '403':
          $ref: '#/components/responses/Forbidden'

  /tenants/{tenant_id}:
    get:
      tags: [Tenants]
      summary: Get a tenant
      description: Requires viewer role.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
      responses:
        '200':
          description: Tenant details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
    put:
      tags: [Tenants]
      summary: Update a tenant
      description: |
        Requires admin role. Fields `license` and `flow_cap` require superadmin.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                contact_email:
                  type: string
                magic_link_login:
                  type: boolean
                approved_domains:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: string
                license:
                  type: string
                  description: Superadmin only
                flow_cap:
                  type: integer
                  description: Superadmin only
      responses:
        '200':
          description: Updated tenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
    delete:
      tags: [Tenants]
      summary: Delete a tenant
      description: Requires admin role.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
      responses:
        '200':
          description: Tenant deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOk'

  /tenants/{tenant_id}/users:
    get:
      tags: [Tenants]
      summary: List members of a tenant
      description: Requires viewer role.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
      responses:
        '200':
          description: Tenant members
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
    post:
      tags: [Tenants]
      summary: Add a user to a tenant
      description: Requires admin role.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                roles:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: User added
          content:
            application/json:
              schema:
                type: object

  /tenants/{tenant_id}/users/{user_id}:
    put:
      tags: [Tenants]
      summary: Update a user within a tenant
      description: Requires admin role. Can update profile fields and roles.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
        - $ref: '#/components/parameters/user_id'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                display_name:
                  type: string
                license:
                  type: string
                trial_days:
                  type: integer
                roles:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOk'
    delete:
      tags: [Tenants]
      summary: Remove a user from a tenant
      description: Requires admin role.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
        - $ref: '#/components/parameters/user_id'
      responses:
        '200':
          description: User removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOk'

  # ── Flows ─────────────────────────────────────────────────────────────────

  /tenants/{tenant_id}/flows:
    get:
      tags: [Flows]
      summary: List flows
      description: Requires viewer role.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: List of flows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Flow'
    post:
      tags: [Flows]
      summary: Create a flow
      description: Requires editor role.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  default: Untitled Flow
      responses:
        '201':
          description: Flow created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Flow'

  /tenants/{tenant_id}/flows/{flow_id}:
    get:
      tags: [Flows]
      summary: Get a flow with nodes, edges, and notes
      description: Requires viewer role.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
        - $ref: '#/components/parameters/flow_id'
      responses:
        '200':
          description: Flow with full detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlowDetail'
    put:
      tags: [Flows]
      summary: Update flow metadata
      description: Requires editor role. Updates name and/or folder.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
        - $ref: '#/components/parameters/flow_id'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                folder:
                  type: string
      responses:
        '200':
          description: Updated flow
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Flow'
    post:
      tags: [Flows]
      summary: Save flow (full canvas upsert)
      description: |
        Requires editor role. Upserts nodes, edges, and node configs.
        Deletes nodes/edges no longer on canvas.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
        - $ref: '#/components/parameters/flow_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nodes:
                  type: array
                  items:
                    type: object
                edges:
                  type: array
                  items:
                    type: object
                node_configs:
                  type: array
                  items:
                    type: object
                    properties:
                      node_id:
                        type: string
                      config:
                        type: object
                notes:
                  type: array
                  items:
                    type: object
                name:
                  type: string
                publish:
                  type: boolean
      responses:
        '200':
          description: Save result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  nodes:
                    type: array
                    items:
                      type: object
                      properties:
                        node_id:
                          type: string
                        id:
                          type: string
                  edges:
                    type: integer
                  notes:
                    type: array
    delete:
      tags: [Flows]
      summary: Delete a flow
      description: Requires editor role.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
        - $ref: '#/components/parameters/flow_id'
      responses:
        '200':
          description: Flow deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /tenants/{tenant_id}/flows/{flow_id}/run:
    post:
      tags: [Flows]
      summary: Run a flow
      description: Requires editor role. Queues a flow execution.
      parameters:
        - $ref: '#/components/parameters/tenant_id'
        - $ref: '#/components/parameters/flow_id'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                input_data:
                  type: object
                start_node_id:
                  type: string
                replay_data:
                  type: object
      responses:
        '200':
          description: Flow queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                  status:
                    type: string
                    example: queued

  /tenants/{tenant_id}/flows/{flow_id}/toggle-publish:
    post:
      tags: [Flows]
