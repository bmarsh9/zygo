      parameters:
        - $ref: '#/components/parameters/tenant_id'
        - $ref: '#/components/parameters/flow_id'
      responses:
        '200':
          description: Schedule info
          content:
            application/json:
              schema:
                type: object
                properties:
                  active:
                    type: boolean
                  cron:
                    type: string
                  node_id:
                    type: string

  /tenants/{tenant_id}/web-forms:
    get:
      tags: [Forms]
      summary: List flows with web form nodes
      description: Requires user role (minimal).
      parameters:
