{% extends "layouts/base.html" %}

{% block navbar %}{% endblock %}
{% block page_header %}{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="card bg-base-100 border border-base-300 w-full max-w-sm">
        <div class="card-body gap-4">

            <div class="text-center">
                <div class="w-12 h-12 rounded-xl bg-warning/10 flex items-center justify-center mx-auto mb-3">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="text-warning">
                        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                </div>
                <div class="text-lg font-bold">Password Required</div>
                <div class="text-xs opacity-40 mt-1">This form is password protected</div>
            </div>

            {% if error %}
            <div class="alert alert-error text-white text-xs py-2">Incorrect password, please try again.</div>
            {% endif %}

            <div x-data="{ password: '', loading: false }">
                <input
                    type="password"
                    class="input input-bordered w-full"
                    placeholder="Enter password"
                    x-model="password"
                    @keydown.enter="
                        loading = true
                        window.location.href = window.location.pathname + '?form_password=' + encodeURIComponent(password)
                    "
                />
                <button
                    class="btn btn-primary w-full mt-3"
                    @click="
                        loading = true
                        window.location.href = window.location.pathname + '?form_password=' + encodeURIComponent(password)
                    "
                    :class="loading ? 'loading' : ''"
                >
                    Continue
                </button>
            </div>

        </div>
    </div>
</div>
{% endblock %}
