{% extends "layouts/base.html" %}

{% block navbar %}{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="max-w-7xl w-full mx-auto py-12 px-4 sm:px-6 lg:py-16 lg:px-8 lg:flex lg:items-center lg:justify-between">
        <h2 class="font-bold tracking-tight">
            <span class="text-3xl block">{{ title or "Something went wrong" }}</span>
            <span class="block text-primary">{{ description }}</span>
        </h2>
        <div class="mt-8 flex lg:mt-0 lg:flex-shrink-0">
            <a href="{{ url_for('main.home') }}" class="btn btn-primary">Home</a>
        </div>
    </div>
</div>
{% endblock %}
