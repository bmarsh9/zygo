{% extends "layouts/base.html" %}

{% block page_header %}{% endblock %}

{% block page_content %}
<div x-data="profile()" class="max-w-4xl mx-auto space-y-4">

    <!-- Avatar + identity banner -->
    <div class="rounded-2xl bg-gradient-to-br from-primary/10 to-base-200 border border-base-300 px-6 py-5 flex items-center gap-5">
        <div class="relative shrink-0">
            <div class="w-16 h-16 rounded-2xl bg-primary flex items-center justify-center shadow-md">
                <span class="text-2xl font-bold text-primary-content capitalize" x-text="userForm.email?.[0] ?? '?'"></span>
            </div>
            <div class="absolute -bottom-1 -right-1 w-4 h-4 rounded-full bg-success border-2 border-base-100"></div>
        </div>
        <div class="min-w-0">
            <div class="flex items-center gap-2">
                <div class="text-base font-semibold truncate" x-text="userForm.display_name || 'No display name'"></div>
                <span x-show="$store.app.user.super" class="text-[10px] font-medium px-2 py-0.5 rounded-full bg-error/10 text-error">Super</span>
            </div>
            <div class="text-sm opacity-50 truncate" x-text="userForm.email"></div>

            <div class="flex items-center gap-1.5 mt-2 flex-wrap">
                <template x-for="role in $store.app.roles" :key="role">
                    <span class="green-badge text-xs" x-text="role"></span>
                </template>
            </div>
        </div>
    </div>

    <!-- User Information -->
    <div class="rounded-2xl border border-base-300 bg-base-100 overflow-hidden">
        <div class="px-6 py-4 border-b border-base-200 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 opacity-40" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/>
            </svg>
            <span class="text-sm font-semibold">User Information</span>
        </div>
        <div class="px-6 py-5 grid grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-medium opacity-50 mb-1.5 uppercase tracking-wide">Display Name</label>
                <input type="text" x-model="userForm.display_name"
                    class="input input-sm input-bordered w-full bg-base-200 focus:bg-base-100 transition-colors" />
            </div>
            <div>
                <label class="block text-xs font-medium opacity-50 mb-1.5 uppercase tracking-wide">Email</label>
                <input type="email" x-model="userForm.email"
                    class="input input-sm input-bordered w-full bg-base-200 focus:bg-base-100 transition-colors" />
            </div>
            <div>
                <label class="block text-xs font-medium opacity-50 mb-1.5 uppercase tracking-wide">Status</label>
                <select x-model="userForm.is_active" class="select select-sm select-bordered w-full bg-base-200">
                    <option :value="true">Active</option>
                    <option :value="false">Inactive</option>
                </select>
            </div>
        </div>
        <div class="px-6 py-3 bg-base-200/50 border-t border-base-200 flex justify-end">
            <button class="btn btn-sm btn-primary gap-2" :disabled="busy.user" @click="saveUser()">
                <span x-show="busy.user" class="loading loading-spinner loading-xs"></span>
                <span x-show="!busy.user">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0 1 11.186 0Z"/>
                    </svg>
                </span>
                Save changes
            </button>
        </div>
    </div>

    <!-- Change Password -->
    <div class="rounded-2xl border border-base-300 bg-base-100 overflow-hidden">
        <div class="px-6 py-4 border-b border-base-200 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 opacity-40" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/>
            </svg>
            <span class="text-sm font-semibold">Change Password</span>
        </div>
        <div class="px-6 py-5 grid grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-medium opacity-50 mb-1.5 uppercase tracking-wide">New Password</label>
                <input type="password" x-model="pwForm.password"
                    class="input input-sm input-bordered w-full bg-base-200 focus:bg-base-100 transition-colors" />
            </div>
            <div>
                <label class="block text-xs font-medium opacity-50 mb-1.5 uppercase tracking-wide">Repeat Password</label>
                <input type="password" x-model="pwForm.password2"
                    class="input input-sm input-bordered w-full bg-base-200 focus:bg-base-100 transition-colors" />
            </div>
            <!-- Validation hints -->
            <div class="col-span-2 space-y-1" x-show="pwForm.password">
                <div class="flex items-center gap-2 text-xs"
                    :class="pwForm.password.length >= 12 ? 'text-success' : 'text-error'">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                        <path x-show="pwForm.password.length >= 12" stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
                        <path x-show="pwForm.password.length < 12" stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/>
                    </svg>
                    At least 12 characters
                </div>
                <div class="flex items-center gap-2 text-xs"
                    :class="pwForm.password && pwForm.password === pwForm.password2 ? 'text-success' : 'text-error'">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                        <path x-show="pwForm.password === pwForm.password2" stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
                        <path x-show="pwForm.password !== pwForm.password2" stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/>
                    </svg>
                    Passwords match
                </div>
            </div>
        </div>
        <div class="px-6 py-3 bg-base-200/50 border-t border-base-200 flex justify-end">
            <button class="btn btn-sm btn-primary gap-2" :disabled="busy.password || !pwReady" @click="savePassword()">
                <span x-show="busy.password" class="loading loading-spinner loading-xs"></span>
                Update password
            </button>
        </div>
    </div>

    <!-- API Key -->
    <div class="rounded-2xl border border-base-300 bg-base-100 overflow-hidden">
        <div class="px-6 py-4 border-b border-base-200 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 opacity-40" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 0 1 3 3m3 0a6 6 0 0 1-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 0 1 21.75 8.25Z"/>
            </svg>
            <span class="text-sm font-semibold">API Token</span>
        </div>
        <div class="px-6 py-5">
            <p class="text-xs opacity-50 mb-4">Generate a time-limited token to authenticate API requests programmatically.</p>
            <div class="flex items-center gap-3">
                <div>
                    <label class="block text-xs font-medium opacity-50 mb-1.5 uppercase tracking-wide">Expiry</label>
                    <select x-model.number="tokenExpiry" class="select select-sm select-bordered bg-base-200 w-36">
                        <option value="600">10 minutes</option>
                        <option value="3600">1 hour</option>
                        <option value="86400">24 hours</option>
                        <option value="604800">7 days</option>
                    </select>
                </div>
                <div class="pt-5">
                    <button class="btn btn-sm btn-primary gap-2" :disabled="busy.token" @click="generateToken()">
                        <span x-show="busy.token" class="loading loading-spinner loading-xs"></span>
                        <span x-show="!busy.token">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99"/>
                            </svg>
                        </span>
                        Generate token
                    </button>
                </div>
            </div>

            <!-- Token result -->
            <div id="token-result" x-show="token.value" x-transition:enter="transition ease-out duration-200"
                x-transition:enter-start="opacity-0 translate-y-1" x-transition:enter-end="opacity-100 translate-y-0"
                class="mt-4 rounded-xl bg-base-200 border border-base-300 p-4">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-xs font-medium opacity-50 uppercase tracking-wide">Token</span>
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] opacity-40" x-text="'Expires in ' + token.expiresLabel"></span>
                        <button @click="copyToken()" class="btn btn-xs btn-ghost gap-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0 0 13.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 0 1-.75.75H9a.75.75 0 0 1-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 0 1-2.25 2.25H6.75A2.25 2.25 0 0 1 4.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 0 1 1.927-.184"/>
                            </svg>
                            Copy
                        </button>
                    </div>
                </div>
                <code class="block text-[11px] font-mono break-all opacity-70 leading-relaxed" x-text="token.value"></code>
            </div>

            <!-- Usage examples -->
            <div x-show="token.value" x-transition:enter="transition ease-out duration-200"
                x-transition:enter-start="opacity-0 translate-y-1" x-transition:enter-end="opacity-100 translate-y-0"
                x-data="{ lang: 'curl' }"
                class="mt-3 rounded-xl bg-base-200 border border-base-300 p-4">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-xs font-medium opacity-50 uppercase tracking-wide">Usage</span>
                    <div class="flex items-center gap-1">
                        <button @click="lang = 'curl'"
                            class="btn btn-xs"
                            :class="lang === 'curl' ? 'btn-primary' : 'btn-ghost'">
                            curl
                        </button>
                        <button @click="lang = 'python'"
                            class="btn btn-xs"
                            :class="lang === 'python' ? 'btn-primary' : 'btn-ghost'">
                            Python
                        </button>
                    </div>
                </div>

                <!-- curl -->
                <div x-show="lang === 'curl'">
                    <code class="block text-[11px] font-mono whitespace-pre-wrap opacity-70 leading-relaxed"
                        x-text="`curl -X GET https://app.com/api/users \\\n  -H 'token: ${token.value}'`">
                    </code>
                </div>

                <!-- Python -->
                <div x-show="lang === 'python'">
                    <code class="block text-[11px] font-mono whitespace-pre-wrap opacity-70 leading-relaxed"
                        x-text='`import requests\n\nresponse = requests.get(\n    &quot;https://app.com/api/users&quot;,\n    headers={&quot;token&quot;: &quot;${token.value}&quot;}\n)\nprint(response.json())`'>
                    </code>
                </div>
            </div>
        </div>
    </div>

    <script>
    function profile() {
        return {
            userForm: { display_name: '', email: '', is_active: true },
            pwForm:   { password: '', password2: '' },
            tokenExpiry: 3600,
            token:       { value: '', expiresLabel: '' },
            busy:        { user: false, password: false, token: false },

            init() {
                const user = Alpine.store('app').user
                this.userForm = {
                    display_name: user.display_name ?? '',
                    email:        user.email        ?? '',
                    is_active:    user.is_active    ?? true,
                }
            },

            get pwReady() {
                return this.pwForm.password
                    && this.pwForm.password === this.pwForm.password2
                    && this.pwForm.password.length >= 12
            },

            saveUser() {
                const userId   = Alpine.store('app').user.id
                this.busy.user = true
                request('PUT', `/api/users/${userId}`,
                    () => {
                        Alpine.store('app').refreshSession()
                        toast('Profile updated')
                        this.busy.user = false
                    },
                    err => { toast(err.message, 'error'); this.busy.user = false }
                , {
                    display_name: this.userForm.display_name,
                    email:        this.userForm.email,
                    is_active:    this.userForm.is_active,
                })
            },

            savePassword() {
                if (!this.pwReady) return
                const userId       = Alpine.store('app').user.id
                this.busy.password = true
                request('PUT', `/api/v1/users/${userId}/password`,
                    () => {
                        toast('Password updated')
                        this.pwForm        = { password: '', password2: '' }
                        this.busy.password = false
                    },
                    err => { toast(err.message, 'error'); this.busy.password = false }
                , {
                    password:  this.pwForm.password,
                    password2: this.pwForm.password2,
                })
            },

            async generateToken() {
                this.busy.token = true
                try {
                    const res  = await fetch(`/api/token?expiration=${this.tokenExpiry}`)
                    if (!res.ok) throw new Error('Failed to generate token')
                    const data = await res.json()
                    this.token = {
                        value:        data.token,
                        expiresLabel: this.formatExpiry(data.expires_in),
                    }
                    toast('Token generated')
                    await this.$nextTick()
                    document.querySelector('#token-result')?.scrollIntoView({ behavior: 'smooth', block: 'center' })
                } catch(e) {
                    toast(e.message, 'error')
                }
                this.busy.token = false
            },

            copyToken() {
                navigator.clipboard.writeText(this.token.value).then(() => toast('Token copied'))
            },

            formatExpiry(seconds) {
                if (seconds < 3600)  return Math.floor(seconds / 60)   + ' minutes'
                if (seconds < 86400) return Math.floor(seconds / 3600) + ' hour(s)'
                return Math.floor(seconds / 86400) + ' day(s)'
            },
        }
    }
    </script>
</div>
{% endblock %}
